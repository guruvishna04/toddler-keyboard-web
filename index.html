<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="A toddler-friendly keyboard practice app for colorful typing.">
    <title>Little Typing Colors</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell" aria-labelledby="app-title">
      <section class="word-stage" aria-label="Typing practice">
        <div class="copy-card practice-strip">
          <div class="word-row given-row">
            <span class="word-label">See</span>
            <h1 id="app-title" class="target-word">
              <input id="target-word" class="target-word-input" type="text" value="dada" maxlength="8" autocomplete="off" autocapitalize="off" spellcheck="false" aria-label="Reference word">
            </h1>
          </div>

          <div class="word-row type-row">
            <span class="word-label">Type</span>
            <p id="tap-prompt" class="tap-prompt" aria-live="polite">Tap D</p>
            <div
              id="typed-display"
              class="typed-display"
              aria-live="polite"
              aria-label="Typed letters"
            ></div>

            <div class="progress-dots" aria-hidden="true"></div>
          </div>
        </div>
      </section>

      <section class="control-strip" aria-label="Color controls">
        <div class="color-panel" aria-label="Color controls">
          <div class="editor-title">Color</div>
          <div class="color-tray" aria-label="Choose letter color">
            <button class="color-button rainbow-button" type="button" data-color-mode="rainbow" aria-label="Choose rainbow">
              <span></span>
            </button>
            <button class="color-button selected" type="button" data-color="#e53935" aria-label="Choose red">
              <span style="background: #e53935"></span>
            </button>
            <button class="color-button" type="button" data-color="#fb8c00" aria-label="Choose orange">
              <span style="background: #fb8c00"></span>
            </button>
            <button class="color-button" type="button" data-color="#1e88e5" aria-label="Choose blue">
              <span style="background: #1e88e5"></span>
            </button>
            <button class="color-button" type="button" data-color="#43a047" aria-label="Choose green">
              <span style="background: #43a047"></span>
            </button>
            <button class="color-button" type="button" data-color="#fdd835" aria-label="Choose yellow">
              <span style="background: #fdd835"></span>
            </button>
            <button class="color-button" type="button" data-color="#8e24aa" aria-label="Choose purple">
              <span style="background: #8e24aa"></span>
            </button>
          </div>
        </div>
      </section>

      <aside id="helper-truck" class="monster-truck ready" aria-label="Dancing monster truck helper">
        <svg class="monster-svg" viewBox="0 0 380 260" role="img" aria-label="Happy dancing monster truck helper">
          <g class="monster-dancer">
            <ellipse class="monster-shadow" cx="192" cy="224" rx="128" ry="16"></ellipse>
            <circle class="monster-wheel" cx="112" cy="198" r="43"></circle>
            <circle class="monster-wheel" cx="274" cy="198" r="43"></circle>
            <circle class="monster-rim" cx="112" cy="198" r="19"></circle>
            <circle class="monster-rim" cx="274" cy="198" r="19"></circle>
            <path class="monster-suspension" d="M126 177 L170 142 L224 177 M254 177 L218 142 L168 177" fill="none"></path>
            <path class="monster-body" d="M70 130 q34 -54 104 -58 h76 q54 0 78 54 l13 48 H72z"></path>
            <path class="monster-hood" d="M70 130 h84 q28 0 44 26 l12 18 H70z"></path>
            <path class="monster-cab" d="M156 74 h104 q36 0 50 40 l18 60 H132 l-8 -58 q-6 -42 32 -42z"></path>
            <path class="monster-window" d="M172 92 h76 q24 0 34 26 l8 30 H150 l-5 -31 q-4 -25 27 -25z"></path>
            <path class="monster-roof" d="M170 51 h82 q22 0 30 22 l4 12 H150 l4 -14 q6 -20 16 -20z"></path>
            <circle class="monster-light" cx="98" cy="153" r="18"></circle>
            <circle class="monster-light" cx="304" cy="153" r="18"></circle>
            <rect class="monster-bumper" x="104" y="169" width="176" height="24" rx="12"></rect>
            <g class="monster-face">
              <circle class="monster-eye" cx="188" cy="119" r="9"></circle>
              <circle class="monster-eye" cx="236" cy="119" r="9"></circle>
              <path class="monster-smile" d="M176 148 q38 32 82 0" fill="none"></path>
              <path class="monster-frown" d="M178 162 q38 -24 78 0" fill="none"></path>
              <path class="monster-mouth" d="M197 154 q18 16 38 0 q-6 30 -29 28 q-15 -2 -9 -28z"></path>
              <circle class="monster-cheek" cx="160" cy="145" r="7"></circle>
              <circle class="monster-cheek" cx="270" cy="145" r="7"></circle>
            </g>
          </g>
        </svg>
        <div class="helper-copy">
          <div id="helper-message-bubble" class="helper-message-bubble" aria-live="polite">I can help!</div>
          <button id="help-type-button" class="help-type-button" type="button">Help type</button>
        </div>
      </aside>

      <section class="keyboard-area" aria-label="Keyboard controls">
        <div class="keyboard" aria-label="Alphabet keyboard">
          <button class="key-button key-focus" type="button" data-key="d" aria-label="Type D">D</button>
          <button class="key-button key-focus" type="button" data-key="a" aria-label="Type A">A</button>
          <button class="key-button" type="button" data-key="b" aria-label="Type B">B</button>
          <button class="key-button" type="button" data-key="c" aria-label="Type C">C</button>
          <button class="key-button" type="button" data-key="e" aria-label="Type E">E</button>
          <button class="key-button" type="button" data-key="f" aria-label="Type F">F</button>
          <button class="key-button" type="button" data-key="g" aria-label="Type G">G</button>
          <button class="key-button" type="button" data-key="h" aria-label="Type H">H</button>
          <button class="key-button" type="button" data-key="i" aria-label="Type I">I</button>
          <button class="key-button" type="button" data-key="j" aria-label="Type J">J</button>
          <button class="key-button" type="button" data-key="k" aria-label="Type K">K</button>
          <button class="key-button" type="button" data-key="l" aria-label="Type L">L</button>
          <button class="key-button" type="button" data-key="m" aria-label="Type M">M</button>
          <button class="key-button" type="button" data-key="n" aria-label="Type N">N</button>
          <button class="key-button" type="button" data-key="o" aria-label="Type O">O</button>
          <button class="key-button" type="button" data-key="p" aria-label="Type P">P</button>
          <button class="key-button" type="button" data-key="q" aria-label="Type Q">Q</button>
          <button class="key-button" type="button" data-key="r" aria-label="Type R">R</button>
          <button class="key-button" type="button" data-key="s" aria-label="Type S">S</button>
          <button class="key-button" type="button" data-key="t" aria-label="Type T">T</button>
          <button class="key-button" type="button" data-key="u" aria-label="Type U">U</button>
          <button class="key-button" type="button" data-key="v" aria-label="Type V">V</button>
          <button class="key-button" type="button" data-key="w" aria-label="Type W">W</button>
          <button class="key-button" type="button" data-key="x" aria-label="Type X">X</button>
          <button class="key-button" type="button" data-key="y" aria-label="Type Y">Y</button>
          <button class="key-button" type="button" data-key="z" aria-label="Type Z">Z</button>
        </div>

        <div class="action-row">
          <select id="language-select" class="language-select" aria-label="Choose language">
            <option value="en-US">English</option>
            <option value="es-ES">Spanish</option>
            <option value="fr-FR">French</option>
            <option value="de-DE">German</option>
          </select>
          <button id="caps-toggle" class="action-button caps-toggle" type="button" aria-label="Caps Lock" aria-pressed="false">Caps</button>
          <button id="backspace-button" class="action-button" type="button" aria-label="Backspace">Back</button>
          <button id="clear-button" class="action-button primary" type="button" aria-label="Clear typed letters">Clear</button>
          <button id="sound-toggle" class="action-button" type="button" aria-pressed="true">Sound On</button>
          <button id="fullscreen-button" class="action-button" type="button" aria-label="Fullscreen">Full</button>
        </div>
      </section>
    </main>

    <div id="celebration-layer" class="celebration-layer" aria-hidden="true"></div>

    <script src="app.js"></script>
  </body>
</html>
